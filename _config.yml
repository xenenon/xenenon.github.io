title: /home
description: My Personal website and space on the web.
author: Jeremy Adam Palmer
github: https://github.com/xenenon
about: Cyber | Tech | Life 
disqus_shortname:
google_analytics: 

enableTags: true
tagarray: [blog]

collections:
  project:
    output: true
    permalink: /project/:path/

social:
    - icon: fa-linkedin
      link: "https://linkedin.com/in/jeremyadampalmer"
    - icon: fa-github
      link: "https://github.com/xenenon"

share:
  twitter_username: 
  fb_appid: 

urls:
    - text: About
      url: /about/
    - text: Projects
      url: /projects/
    - text: Categories
      url: /categories/
    - text: Tags
      url: /tags/
    - text: XML Feed
      url: /feed.xml

url: "https://xenenon.github.io"
baseurl: ""
paginate: 20
per_page: 20
paginate_path: "/page/:num/"
markdown: kramdown
plugins:
  - jekyll-paginate
  - jekyll-gist

compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  ignore:
    envs: ['development']
